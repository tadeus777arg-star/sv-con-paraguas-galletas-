# Here you can create your own custom placeholders to use it in language config.
# Key = Placeholder, Value = Replacer.
Placeholders:
  '%gray%': '#aaa8a8'
  '%green%': '#74ea31'
  '%red%': '#ea3131'
Command:
  Editor:
    Desc: Open the dungeon and key editor.
  Drop:
    Usage: <dungeon_id> <world> <x> <y> <z>
    Desc: Place a dungeon at the specified location in the world.
    Done: '#aaa8a8Dungeon #ead931%dungeon_name%#aaa8a8 has been placed at coordinates #ead931%location_x%, %location_y%, %location_z%#aaa8a8 in world #ead931%location_world%#aaa8a8.'
    Error: '#ea3131An error occurred while trying to spawn a #e39fff%dungeon_name%#ea3131! See the error in the console'
  Delete:
    Usage: <dungeon_id>
    Desc: Despawn a specific or all dungeon.
    Done: '#aaa8a8Dungeon #ead931%dungeon_name%#aaa8a8 has been despawned'
  Key:
    Desc: Manage player keys.
    Usage: '[help]'
    Give:
      Usage: <player> <key> <amount> [-s]
      Desc: Give a key to a player.
      Done: '#aaa8a8Given #ead931x%amount%#aaa8a8 keys of type #ead931%key_name%#aaa8a8 to player #ead931%player_name%#aaa8a8.'
      Notify: '#aaa8a8You have received #ead931x%amount%#aaa8a8 keys of type #ead931%key_name%#aaa8a8!'
    GiveAll:
      Usage: <key> <amount> [-s]
      Desc: Give a key to all online players.
      Done: '#aaa8a8Given #ead931x%amount%#aaa8a8 keys of type #ead931%key_name%#aaa8a8 to all players.'
    Take:
      Usage: <player> <key> <amount> [-s]
      Desc: Take a key from a player.
      Done: '#aaa8a8Taken #ead931x%amount%#aaa8a8 keys of type #ead931%key_name%#aaa8a8 from player #ead931%player_name%#aaa8a8.'
      Notify: '#aaa8a8You have lost #fd5e5ex%amount% %key_name%#aaa8a8.'
    Set:
      Usage: <player> <key> <amount> [-s]
      Desc: Set the number of keys for a player.
      Done: '#aaa8a8The number of keys of type #ead931%key_name%#aaa8a8 for player #ead931%player_name%#aaa8a8 has been changed to #ead931x%amount%#aaa8a8.'
      Notify: '#aaa8a8The number of your keys of type #ead931%key_name%#aaa8a8 has been changed to #ead931x%amount%#aaa8a8.'
Dungeon:
  Error:
    Invalid: '#ea3131Invalid dungeon!'
    Exists: '#ea3131A dungeon with that ID already exists!'
  Key:
    Error:
      Invalid: '#ea3131Invalid key!'
      Exists: '#ea3131A key with that ID already exists!'
  Open:
    Error:
      NoKey:
      - <! type:"titles:20:80:20" !>#ea3131&l
      - Oops!#aaa8a8
      - You don't have the key for this Dungeon!
      NoHoldKey:
      - <! type:"titles:20:80:20" !>#ea3131&l
      - Oops!#aaa8a8
      - You must be holding the key to open the Dungeon!
