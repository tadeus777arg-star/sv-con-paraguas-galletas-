# ===========================================
# SLOT MACHINE LOOTBOX CONFIGURATION
# ===========================================
# Designed for the ThreeInRowSpinGUI animation
# This lootbox works like a slot machine where
# the player wins the jackpot (25% chance) if
# all three reels match!

# Unique identifier for the lootbox
# Must be unique across all lootboxes
id: example_three_in_row_premium

# Title of the lootbox
# Supports MiniMessage format (<color>, <gradient>, etc.)
title: <gradient:#FFD700:#FF6347>Lucky Slots</gradient>

# Description shown when hovering over the lootbox
# Supports MiniMessage format
# Each line is a new element in the list
# Use '' for empty lines
description:
  - <gray> • Virtual items
  - <gray> • Custom weapons
  - <gray> • Rare roles
  - ''  # Empty line
  - <gold>Good luck!

# Lore shown when hovering over the lootbox
lore:
  - <gray>A slot machine lootbox
  - <gray>Match 3 symbols to win the jackpot!
  - ''
  - <gold>🎰 Try your luck! 🎰

# Animation type for this lootbox
# Using THREE_IN_ROW for slot machine animation
animationType: THREE_IN_ROW

# Counter for how many times this lootbox has been opened
# Auto-incremented by the plugin
openedCount: 0

# Create date
created: 2024-12-14 13:13:13

# List of possible rewards
# For THREE_IN_ROW, the first reward (highest rarity)
# will be used as the jackpot reward. All others are
# used as possible symbols shown while spinning.
items:
  # =====================
  # JACKPOT REWARD (Grand Prize)
  # =====================
  '0':
    id: grand-jackpot
    chance: 5.0     # ThreeInRowSpinGUI uses 25% chance by default
    rarity: LEGENDARY
    item:
      type: DRAGON_EGG
      meta:
        displayName: "<gold><bold>GRAND JACKPOT</bold>"
        lore:
          - "<yellow>Congratulations!"
          - "<yellow>You've hit the jackpot!"
    action:
      type: COMMAND
      commands:
        - "eco give {player} 10000"

  # =====================
  # FILLER REWARDS (Used in animation)
  # These show up during spinning and as non-matching symbols
  # =====================
  '1':
    id: diamond-symbol
    chance: 0    # Not used in THREE_IN_ROW animation
    rarity: EPIC
    item:
      type: DIAMOND
      meta:
        displayName: "<aqua>Diamond Symbol"
    action:
      type: COMMAND
      commands:
        - "eco give {player} 5000"
  '2':
    id: emerald-symbol
    chance: 0
    rarity: RARE
    item:
      type: EMERALD
      meta:
        displayName: "<green>Emerald Symbol"
    action:
      type: COMMAND
      commands:
        - "eco give {player} 3500"

  '3':
    id: gold-symbol
    chance: 0
    rarity: UNCOMMON
    item:
      type: GOLD_INGOT
      meta:
        displayName: "<yellow>Gold Symbol"
    action:
      type: COMMAND
      commands:
        - "eco give {player} 2500"

  '4':
    id: apple-symbol
    chance: 0
    rarity: UNCOMMON
    item:
      type: GOLDEN_APPLE
      meta:
        displayName: "<gold>Apple Symbol"
    action:
      type: COMMAND
      commands:
        - "eco give {player} 1500"

  '5':
    id: xp-symbol
    chance: 0
    rarity: UNCOMMON
    item:
      type: EXPERIENCE_BOTTLE
      meta:
        displayName: "<green>XP Symbol"
    action:
      type: COMMAND
      commands:
        - "xp give {player} 100 levels"

  # =====================
  # CONSOLATION PRIZE
  # This is the reward given if jackpot is not won
  # For THREE_IN_ROW, by default a cookie is given as consolation
  # =====================
  '6':
    id: consolation-prize
    chance: 0    # Not used in probability calc for THREE_IN_ROW
    rarity: COMMON
    item:
      type: COOKIE
      meta:
        displayName: "<gray>Consolation Prize"
        lore:
          - "<gray>Better luck next time!"

# List of placed lootbox locations
# Automatically managed by the plugin
locations: {}

# Optional key requirement
key_required: true
key:
  material: TRIPWIRE_HOOK
  name: "<gold>🎰 Slot Token 🎰"
  lore:
    - "<gray>Insert this token into"
    - "<gray>the Lucky Slots machine"
    - "<gray>for a chance to win big!"

# =====================
# NOTES ABOUT THREE_IN_ROW ANIMATION
# =====================
# The ThreeInRowSpinGUI animation:
# - Has 3 spinning reels that stop one after another
# - Has ~25% chance of jackpot (configurable in code)
# - Shows random items while spinning
# - If all 3 reels match at the end, player wins the jackpot
# - If not a jackpot, player gets a consolation prize (cookie by default)
#
# To customize the jackpot chance, you would need to modify
# the JACKPOT_CHANCE constant in ThreeInRowSpinGUI.java
