# List of placed lootbox locations
locations: {}

# Optional key requirement
# INFO: do not support real keys yet
key_required: true
key:
  material: AMETHYST_SHARD
  name: "<light_purple>🔮 Mystic Key 🔮"
  lore:
    - "<gray>A crystalline key that resonates"
    - "<gray>with the Mystic Circle's energy"
    - ""
    - "<light_purple>Unlocks premium circle animation"

# Notes:
# - Total chances add up to 100%
