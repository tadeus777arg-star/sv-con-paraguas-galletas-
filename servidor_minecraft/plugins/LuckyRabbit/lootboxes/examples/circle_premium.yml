# ===========================================
# CIRCLE ANIMATION LOOTBOX CONFIGURATION
# ===========================================
# Designed for the CircleSpinGUI animation
# Items spin in a circular pattern creating
# a mesmerizing visual effect!

# Unique identifier for the lootbox
id: example_circle_premium

# Title of the lootbox
# Supports MiniMessage format
title: <gradient:#FF69B4:#9370DB>Mystic Circle</gradient>

# Description shown when hovering over the lootbox
# Supports MiniMessage format
# Each line is a new element in the list
# Use '' for empty lines
description:
  - <gray> • Virtual items
  - <gray> • Custom weapons
  - <gray> • Rare roles
  - ''  # Empty line
  - <gold>Good luck!

# Lore shown when hovering over the lootbox
lore:
  - <gray>A magical lootbox with mystical powers
  - <gray>Items dance in a sacred circle
  - ''
  - <light_purple>✨ Premium Circle Animation ✨

# Animation type for this lootbox
# Using CIRCLE for circular spinning animation
animationType: CIRCLE

# Counter for how many times this lootbox has been opened
openedCount: 0

# Create date
created: 2025-07-07 20:00:00

# List of possible rewards
# Themed around magic and mysticism to match the circle animation
items:
  # =====================
  # LEGENDARY TIER (5% total chance)
  # Extremely rare magical items
  # =====================
  '0':
    id: ancient-staff
    chance: 2.0
    rarity: LEGENDARY
    item:
      type: BLAZE_ROD
      meta:
        displayName: "<light_purple><bold>Ancient Staff of Power</bold>"
        lore:
          - "<gray>An ancient staff pulsing with"
          - "<gray>mystical energy from the void"
          - ""
          - "<light_purple>Legendary Artifact"
        enchants:
          KNOCKBACK: 10
          FIRE_ASPECT: 2
        glow: true
    action:
      type: COMMAND
      commands:
        - "give {player} diamond 64"
        - "eco give {player} 50000"
        - "broadcast <light_purple>{player} <gray>has obtained the <light_purple><bold>Ancient Staff of Power</bold><gray>!"

  '1':
    id: void-crystal
    chance: 3.0
    rarity: LEGENDARY
    item:
      type: AMETHYST_SHARD
      meta:
        displayName: "<dark_purple><bold>Void Crystal</bold>"
        lore:
          - "<gray>A crystallized fragment of pure void"
          - "<gray>energy, shimmering with dark power"
          - ""
          - "<dark_purple>Reality Bender"
        glow: true
    action:
      type: COMMAND
      commands:
        - "give {player} netherite_ingot 32"
